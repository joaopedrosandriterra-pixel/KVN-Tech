<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}KVN Tech{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <header class="mx-auto flex max-w-6xl items-center justify-between px-6 py-6 lg:px-8">
      <a href="/" class="text-xl font-semibold tracking-wide">KVN Tech</a>
      <nav class="flex gap-4 text-sm text-slate-300">
        <a href="/" class="hover:text-cyan-400">Início</a>
        <a href="/sobre/" class="hover:text-cyan-400">Sobre</a>
        <a href="/laboratorio/" class="hover:text-cyan-400">Laboratório</a>
        <a href="/#contato" class="hover:text-cyan-400">Contato</a>
      </nav>
    </header>

    <main class="mx-auto flex max-w-6xl flex-col gap-20 px-6 pb-20 lg:px-8">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-800 py-8 text-center text-sm text-slate-400">
      © 2026 KVN Tech · Desenvolvimento web, sistemas, apps e automações.
    </footer>
  </body>
</html>
